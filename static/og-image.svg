<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Movie Horizon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10141d"/>
      <stop offset="1" stop-color="#07080d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.1" r="0.9">
      <stop offset="0" stop-color="#d4b06a" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#d4b06a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecd29a"/>
      <stop offset="0.55" stop-color="#d4b06a"/>
      <stop offset="1" stop-color="#b8923f"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Play tile mark -->
  <g transform="translate(96 219)">
    <rect x="0" y="0" width="192" height="192" rx="44" fill="#141822"
          stroke="#d4b06a" stroke-opacity="0.35" stroke-width="2"/>
    <path d="M74 56 L142 96 L74 136 Z" fill="url(#gold)"/>
  </g>

  <!-- Wordmark -->
  <text x="340" y="300" font-family="'Playfair Display', Georgia, serif"
        font-size="92" font-weight="700" fill="#f5f7fb">Movie Horizon</text>
  <text x="344" y="364" font-family="Inter, Arial, sans-serif"
        font-size="34" font-weight="500" fill="#9aa3b2">Discover upcoming movies worldwide</text>

  <!-- Gold accent rule -->
  <rect x="344" y="392" width="120" height="4" rx="2" fill="url(#gold)"/>
</svg>
